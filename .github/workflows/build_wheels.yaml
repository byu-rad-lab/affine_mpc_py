name: Build Python Wheels

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
  CIBW_SKIP: "pp* cp3??t-* *-win32 *-manylinux_i686 *-musllinux_i686"
  CIBW_ARCHS_WINDOWS: AMD64
  CIBW_TEST_REQUIRES: pytest
  CIBW_TEST_COMMAND: "python -m pytest {project}/test/test_options.py"
  CIBW_ENVIRONMENT_LINUX: >-
    CMAKE_ARGS=-DEigen3_INCLUDE_DIR=/usr/include/eigen3
  CIBW_ENVIRONMENT_WINDOWS: >-
    CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
  CIBW_BEFORE_ALL_LINUX: >-
    yum install -y eigen3-devel

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # - name: Install system dependencies
      #   run: |
      #     if [[ "${{ runner.os }}" == "Linux" ]]; then
      #       sudo apt-get update
      #       sudo apt-get install -y cmake build-essential zlib1g-dev libeigen3-dev
      #     elif [[ "${{ runner.os }}" == "Windows" ]]; then
      #       choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
      #       choco install zlib eigen -y
      #     elif [[ "${{ runner.os }}" == "macOS" ]]; then
      #       brew update
      #       brew install cmake zlib eigen
      #     fi

      # Windows step
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # run: |
        #   choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
        #   choco install zlib eigen -y
        run: |
          # Clone vcpkg
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg

          # Bootstrap vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

          # Install required packages (zlib + Eigen)
          C:\vcpkg\vcpkg install zlib:x64-windows eigen3:x64-windows

          # Export the toolchain file path as an environment variable
          # echo "##vso[task.setvariable variable=VCPKG_TOOLCHAIN_FILE]C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

      # macOS step
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake zlib eigen

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: cibuildwheel --output-dir wheelhouse

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        run: cibuildwheel --output-dir wheelhouse

      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        run: cibuildwheel --output-dir wheelhouse

      - name: List built wheels (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path wheelhouse) {
              ls wheelhouse
          } else {
              Write-Host "wheelhouse folder does not exist yet."
          }

      - name: List built wheels (Linux/macOS)
        if: runner.os != 'Windows'
        run: ls -l wheelhouse

      - name: Upload built wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     user: __token__
      #     password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish wheels to TestPyPI
        if: matrix.os == 'ubuntu-latest'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          packages_dir: wheelhouse
